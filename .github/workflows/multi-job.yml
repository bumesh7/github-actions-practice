name: multi-level job

on:
 push:
  branches:
   - main

jobs:
 build:
  runs-on: ubuntu-latest
  steps:
   - name: Build app
     run: |
      echo "Building the app"

 test:
  runs-on: ubuntu-latest
  needs: build
  steps:
   - name: Test app
     run: |
      echo "Testing the app"

 deploy:
  runs-on: ubuntu-latest
  needs: test
  steps:
   - name: Deploy app
     run: |
      echo "Deploying the app"
