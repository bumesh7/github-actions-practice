name: Runner Info

on:
  push:
    branches: [main]

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print system info (Ubuntu)
        run: |
          echo "OS: Ubuntu"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"

  windows-job:
    runs-on: windows-latest
    steps:
      - name: Print system info (Windows)
        run: |
          echo "OS: Windows"
          hostname
          whoami

  macos-job:
    runs-on: macos-latest
    steps:
      - name: Print system info (macOS)
        run: |
          echo "OS: macOS"
          hostname
          whoami
