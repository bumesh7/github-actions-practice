name: PR Check + Schedule

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight UTC

jobs:
  pr-check:
    runs-on: ubuntu-latest

    steps:
      - name: Scheduled or PR run
        run: |
          echo "Workflow triggered"
          echo "Event: ${{ github.event_name }}"
