name: Manual Workflow

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Select environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
 manual-job:
  runs-on: ubuntu-latest

  steps: 
   - name: Print Environment
     run: echo "Selected environment is ${{ github.event.inputs.environment }}" 
